site_name: Bioinformatics Workshop — Basics of Bulk RNA-Seq Analysis
site_description: UF Health Cancer Institute Biostatistics and Computational Biology Shared Resource
docs_dir: docs
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    primary: black
  features:
    - navigation.sections
    - toc.integrate
    - content.code.copy
  
  font:
    text: Roboto
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Home: index.md
  - Command Line Basics: 01_command-line-basics/command-line-basics.md
