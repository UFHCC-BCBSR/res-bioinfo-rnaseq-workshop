  - R Basics: 05_r-basics/r-basics.md
  - AI Chatbot Tips: 06_ai-chatbot/ai-chatbot.md
  - Preprocessing:
    - Nextflow and nf-core: 03_preprocessing/nexflow_nfcore.md  
    - nf-core/rnaseq: 03_preprocessing/nf-core_rnaseq.md  
    - MultiQC Report: 03_preprocessing/quality_control.md  
    - Quantification Review: 03_preprocessing/quantification.md
  - Differential Expression:
    - Overview & Background: 04_differential-expression/overview.md
    - Visualization: 04_differential-expression/visualization.md
    - Pathway Analysis: 04_differential-expression/pathway-analysis.md
    - Demo Analysis Setup: 04_differential-expression/workshop_setup.md

